version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: hackmas-postgres

    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  backend:
    build:
      context: ./backend

    container_name: hackmas-backend

    env_file:
      - ./backend/.env.docker

    ports:
      - "5000:5000"

    depends_on:
      - postgres

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: hackmas-frontend

    env_file:
      - ./frontend/.env.docker

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped

volumes:
  postgres_data: